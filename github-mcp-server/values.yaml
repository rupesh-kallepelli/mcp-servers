replicaCount: 1

image:
  repository: ghcr.io/your-org/github-mcp-server
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

github:
  token: ""

route:
  enabled: true
  host: ""
  tls:
    termination: edge

ingress:
  enabled: false
  className: nginx
  host: github-mcp.example.com
  path: /

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi
